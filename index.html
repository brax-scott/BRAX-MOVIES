<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAX MOVIES | LATEST HD</title>
    <style>
        :root { --accent: #00ffcc; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* HEADER KIBABE */
        header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); box-shadow: 0 0 15px var(--accent); }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--accent); }

        .search-box { padding: 20px; text-align: center; }
        #search-input { width: 80%; max-width: 400px; padding: 12px; border-radius: 25px; border: 1px solid var(--accent); background: #111; color: white; outline: none; }

        /* MOVIE GRID */
        .container { padding: 15px; }
        #movie-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        .movie-card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; position: relative; border: 0.5px solid #222; }
        .movie-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .poster { width: 100%; height: 225px; object-fit: cover; }
        
        .movie-info { padding: 10px; text-align: center; }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating { font-size: 12px; color: var(--accent); font-weight: bold; }

        .btn-play { width: 100%; background: var(--accent); color: black; border: none; padding: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header><div class="logo">BRAX<span>MOVIES</span></div></header>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Tafuta Movie yoyote hapa..." onkeyup="searchMovies()">
    </div>

    <div class="container">
        <div id="movie-list">
            </div>
    </div>

    <script>
        // API KEY YA KWELI (Hii ni ya siri, inavuta movies zote duniani)
        const API_KEY = '8265b3d0b9a89704250235336d33816a';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        // 1. Kuvuta Movie Mpya (UHALISIA)
        async function getMovies() {
            const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}`);
            const data = await res.json();
            showMovies(data.results);
        }

        function showMovies(movies) {
            const list = document.getElementById('movie-list');
            list.innerHTML = '';
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.innerHTML = `
                    <img src="${IMG_URL + movie.poster_path}" class="poster" alt="${movie.title}">
                    <div class="movie-info">
                        <div class="title">${movie.title}</div>
                        <div class="rating">⭐ ${movie.vote_average}</div>
                    </div>
                    <button class="btn-play" onclick="watch('${movie.title}')">ONE CLICK PLAY</button>
                `;
                list.appendChild(card);
            });
        }

        function searchMovies() {
            const term = document.getElementById('search-input').value;
            if(term) {
                fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${term}`)
                .then(res => res.json())
                .then(data => showMovies(data.results));
            } else {
                getMovies();
            }
        }

        function watch(title) {
            alert("Supreme Leader Brax anakuunganisha na Satellite Server... Tafadhali subiri movie: " + title);
            // Hapa unaweza kuweka link ya kuelekea watchsomuch au server nyingine
            window.open('https://watchsomuch.to/Search/' + title, '_blank');
        }

        getMovies();
    </script>
</body>
</html>
