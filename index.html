<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAX MOVIES | DOWNLOAD HD</title>
    <style>
        :root { --main-blue: #00d2ff; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* NAV KIBABE */
        nav { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; sticky: top; }
        .logo { font-size: 22px; font-weight: 900; color: var(--main-blue); }
        input[type="text"] { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; width: 150px; }

        .container { padding: 20px; }
        h2 { font-size: 18px; border-left: 4px solid var(--main-blue); padding-left: 10px; margin-bottom: 20px; }

        /* MOVIE GRID */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .movie-card { background: #151515; border-radius: 10px; overflow: hidden; position: relative; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        
        .poster { width: 100%; height: 210px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; }
        .movie-info { padding: 10px; }
        .title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .year { font-size: 11px; color: var(--main-blue); }

        .quality { position: absolute; top: 5px; right: 5px; background: var(--main-blue); color: black; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 3px; }

        /* DOWNLOAD BUTTON */
        .btn-dl { width: 100%; background: #222; color: white; border: none; padding: 8px; font-size: 12px; cursor: pointer; border-top: 1px solid #333; transition: 0.3s; }
        .btn-dl:hover { background: var(--main-blue); color: black; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BRAX<span>MOVIES</span></div>
        <input type="text" placeholder="Search movie...">
    </nav>

    <div class="container">
        <h2>LATEST UPLOADS</h2>

        <div class="movie-grid">
            <div class="movie-card">
                <div class="quality">720p WEB</div>
                <div class="poster" style="background: url('https://image.tmdb.org/t/p/w500/6Wv97oR9G7Y6860oypA97S9ZpqB.jpg') center/cover;"></div>
                <div class="movie-info">
                    <div class="title">Avatar: The Way of Water</div>
                    <div class="year">2022 • 1.2 GB</div>
                </div>
                <button class="btn-dl" onclick="alert('Inatafuta Torrent Link...')">DOWNLOAD NOW</button>
            </div>

            <div class="movie-card">
                <div class="quality">1080p BluRay</div>
                <div class="poster" style="background: url('https://image.tmdb.org/t/p/w500/v9p9zGvRUKzGf9o6vO8tGfF7U0r.jpg') center/cover;"></div>
                <div class="movie-info">
                    <div class="title">John Wick: Chapter 4</div>
                    <div class="year">2023 • 2.5 GB</div>
                </div>
                <button class="btn-dl" onclick="alert('Inatafuta Torrent Link...')">DOWNLOAD NOW</button>
            </div>

            <div class="movie-card">
                <div class="quality">HDRip</div>
                <div class="poster" style="background: url('https://image.tmdb.org/t/p/w500/kS9Yn9H6H8H8G7H8H8H8H8H8H.jpg') center/cover; background-color: #333;">NO POSTER</div>
                <div class="movie-info">
                    <div class="title">Oppenheimer</div>
                    <div class="year">2023 • 1.8 GB</div>
                </div>
                <button class="btn-dl" onclick="alert('Inatafuta Torrent Link...')">DOWNLOAD NOW</button>
            </div>
        </div>
    </div>

</body>
</html>
