<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAX MOVIES | FULL HD HUB</title>
    <style>
        :root { --neon: #e50914; --dark: #000; --card-bg: #141414; }
        body { background: var(--dark); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        
        header { background: rgba(0,0,0,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--neon); text-transform: uppercase; letter-spacing: -1px; }

        .search-area { padding: 30px 5%; text-align: center; background: linear-gradient(to bottom, #111, #000); }
        #search-input { width: 90%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 1.5px solid #333; background: #222; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        #search-input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .container { padding: 20px 5%; }
        h2 { font-size: 22px; margin-bottom: 20px; color: #fff; }

        /* MOVIE GRID YA KIBABE */
        #movie-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .movie-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; transition: 0.4s ease; cursor: pointer; border: 1px solid #222; }
        .movie-card:hover { transform: scale(1.08); z-index: 10; border-color: var(--neon); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .movie-info { padding: 10px; }
        .title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; color: #aaa; }
        .rating { color: #46d369; font-weight: 900; }

        /* LOADING SPINNER */
        #loader { text-align: center; padding: 50px; display: none; }
    </style>
</head>
<body>

    <header><div class="logo">BRAX<span>MOVIES</span></div></header>

    <div class="search-area">
        <input type="text" id="search-input" placeholder="Tafuta Movie, Series au Ma-Actor hapa..." onkeyup="searchMovies()">
    </div>

    <div class="container">
        <h2 id="section-title">TRENDING NOW 🔥</h2>
        <div id="movie-list">
            </div>
        <div id="loader">Pakua movie zaidi...</div>
    </div>

    <script>
        // HII NDIO ENGINE INAYOPIGA KAZI DUNIA NZIMA
        const KEY = '8265b3d0b9a89704250235336d33816a';
        const IMG = 'https://image.tmdb.org/t/p/w500';

        async function getMovies(url) {
            const res = await fetch(url);
            const data = await res.json();
            if(data.results.length > 0) {
                render(data.results);
            } else {
                document.getElementById('movie-list').innerHTML = `<h3 style="color: grey;">Samahani Supreme Leader, Movie hiyo haijapatikana.</h3>`;
            }
        }

        function render(movies) {
            const list = document.getElementById('movie-list');
            list.innerHTML = '';
            movies.forEach(m => {
                if(!m.poster_path) return;
                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.innerHTML = `
                    <img src="${IMG + m.poster_path}" class="poster" alt="${m.title}">
                    <div class="movie-info">
                        <div class="title">${m.title || m.name}</div>
                        <div class="meta">
                            <span>${(m.release_date || m.first_air_date || '').split('-')[0]}</span>
                            <span class="rating">★ ${m.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => window.open(`https://watchsomuch.to/Search/${m.title || m.name}`, '_blank');
                list.appendChild(card);
            });
        }

        function searchMovies() {
            const term = document.getElementById('search-input').value;
            const title = document.getElementById('section-title');
            if(term && term !== '') {
                title.innerText = `MATOKEO YA: ${term.toUpperCase()}`;
                getMovies(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${term}`);
            } else {
                title.innerText = "TRENDING NOW 🔥";
                init();
            }
        }

        function init() {
            getMovies(`https://api.themoviedb.org/3/trending/all/day?api_key=${KEY}`);
        }

        init();
    </script>
</body>
</html>
